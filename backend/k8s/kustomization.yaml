apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: guitarstore

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - migrate-job.yaml
  - backend-deployment.yaml
  - ingress.yaml
  - seed-job.yaml

images:
  - name: guitarstore-backend
    newName: guitarstore-backend
    newTag: latest
